# new.fbrk.kz - frontend cutover target
# Enable only after DNS points to this VPS and certificate for new.fbrk.kz is issued.

server {
    listen 80;
    listen [::]:80;
    server_name new.fbrk.kz;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/letsencrypt;
        allow all;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name new.fbrk.kz;
    server_tokens off;

    root /var/www/fbrk.qdev.run;
    index index.html;

    # Use dedicated LE cert for new.fbrk.kz after DNS propagation.
    ssl_certificate /etc/letsencrypt/live/new.fbrk.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/new.fbrk.kz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml application/xml application/rss+xml;
    gzip_min_length 1024;

    location ~* ^/js/(data|data-archive|article-full)\.js$ {
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        try_files $uri =404;
    }

    location ~* \.(css|js|svg|png|jpg|jpeg|webp|ico|woff2?)$ {
        expires 30d;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    # Keep the canonical public host separate from backend/admin surfaces.
    location = /admin { return 404; }
    location ^~ /admin/ { return 404; }
    location = /api { return 404; }
    location ^~ /api/ { return 404; }

    location ^~ /a/ {
        proxy_pass         http://127.0.0.1:8787;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 30s;
        proxy_intercept_errors on;
        error_page 404 /404.html;
    }

    location = /sitemap.xml {
        proxy_pass         http://127.0.0.1:8787;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /robots.txt {
        proxy_pass         http://127.0.0.1:8787;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location = /feed.xml {
        proxy_pass         http://127.0.0.1:8787;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location ^~ /feed/ {
        proxy_pass         http://127.0.0.1:8787;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    location / {
        try_files $uri $uri/ $uri.html =404;
    }

    error_page 404 /404.html;
    location = /404.html { internal; }

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Strict-Transport-Security "max-age=15552000" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;

    access_log /var/log/nginx/new.fbrk.kz.access.log;
    error_log  /var/log/nginx/new.fbrk.kz.error.log;
}
