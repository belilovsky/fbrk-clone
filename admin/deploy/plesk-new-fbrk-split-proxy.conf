# Plesk "Additional nginx directives" for new.fbrk.kz
#
# Goal:
# - Keep static frontend files on KZ hosting (new.fbrk.kz)
# - Proxy dynamic/backend routes to VPS backend (fbrk.qdev.run)
#
# Paste into: Domains -> new.fbrk.kz -> Apache & nginx Settings -> Additional nginx directives
# (Do not add `server {}` wrapper here.)

# Canonical article SSR route
location ^~ /a/ {
    proxy_pass         https://fbrk.qdev.run;
    proxy_http_version 1.1;
    proxy_ssl_server_name on;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_read_timeout 60s;
}

# Keep SEO files generated by backend canonical host logic
location = /sitemap.xml {
    proxy_pass         https://fbrk.qdev.run/sitemap.xml;
    proxy_ssl_server_name on;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

location = /robots.txt {
    proxy_pass         https://fbrk.qdev.run/robots.txt;
    proxy_ssl_server_name on;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

location = /feed.xml {
    proxy_pass         https://fbrk.qdev.run/feed.xml;
    proxy_ssl_server_name on;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

location ^~ /feed/ {
    proxy_pass         https://fbrk.qdev.run;
    proxy_ssl_server_name on;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Proto $scheme;
}

# Optional: keep article lists always fresh from backend-generated assets.
# If you prefer local static copies, remove these two locations.
location = /js/data.js {
    proxy_pass         https://fbrk.qdev.run/js/data.js;
    proxy_ssl_server_name on;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Proto $scheme;
    add_header         Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header         Pragma "no-cache" always;
}

location = /js/data-archive.js {
    proxy_pass         https://fbrk.qdev.run/js/data-archive.js;
    proxy_ssl_server_name on;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Proto $scheme;
    add_header         Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header         Pragma "no-cache" always;
}

location = /js/article-full.js {
    proxy_pass         https://fbrk.qdev.run/js/article-full.js;
    proxy_ssl_server_name on;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Forwarded-Host  $host;
    proxy_set_header   X-Forwarded-Proto $scheme;
    add_header         Cache-Control "no-cache, no-store, must-revalidate" always;
    add_header         Pragma "no-cache" always;
}
