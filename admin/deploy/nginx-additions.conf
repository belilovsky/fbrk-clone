# Add inside the existing server { ... } block for fbrk.qdev.run (SSL).
# Place these BEFORE the catch-all "location / { try_files $uri $uri/ =404; }".

# Serve uploads as part of the public site (they're written into /img/uploads/)
# — no special config needed, the static root already covers it.

# --- Admin UI (Jinja) ---
location /admin/ {
    proxy_pass         http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    client_max_body_size 25m;   # image uploads
}

# --- Admin API ---
location /api/ {
    proxy_pass         http://127.0.0.1:8787;
    proxy_http_version 1.1;
    proxy_set_header   Host              $host;
    proxy_set_header   X-Real-IP         $remote_addr;
    proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_read_timeout 60s;
    client_max_body_size 25m;
}
