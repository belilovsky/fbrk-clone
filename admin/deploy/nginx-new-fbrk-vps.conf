# new.fbrk.kz - dedicated KZ frontend VPS
#
# Current deployment target:
#   /etc/nginx/sites-available/new.fbrk.kz on 213.155.22.190
#
# HTTP stays open for Let's Encrypt challenges and redirects all page traffic
# to HTTPS. Certbot stores the live certificate under /etc/letsencrypt.

server {
    listen 80;
    listen [::]:80;
    server_name new.fbrk.kz;

    root /var/www/new.fbrk.kz;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/new.fbrk.kz;
        default_type "text/plain";
        try_files $uri =404;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name new.fbrk.kz;

    ssl_certificate /etc/letsencrypt/live/new.fbrk.kz/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/new.fbrk.kz/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    access_log /var/log/nginx/new.fbrk.kz.access.log;
    error_log  /var/log/nginx/new.fbrk.kz.error.log;

    add_header Strict-Transport-Security "max-age=31536000" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    location / {
        proxy_pass http://127.0.0.1:8088;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Connection "";
    }
}
