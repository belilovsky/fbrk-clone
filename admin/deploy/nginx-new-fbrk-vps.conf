# new.fbrk.kz - dedicated KZ frontend VPS
#
# Current deployment target:
#   /etc/nginx/sites-available/new.fbrk.kz on 213.155.22.190
#
# Before DNS cutover this serves HTTP only and is tested with:
#   curl --resolve new.fbrk.kz:80:213.155.22.190 http://new.fbrk.kz/
# After DNS points to this VPS, run:
#   certbot --nginx -d new.fbrk.kz --non-interactive --agree-tos -m admin@qdev.run --redirect

server {
    listen 80;
    listen [::]:80;
    server_name new.fbrk.kz;

    root /var/www/new.fbrk.kz;
    index index.html;

    access_log /var/log/nginx/new.fbrk.kz.access.log;
    error_log  /var/log/nginx/new.fbrk.kz.error.log;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;

    gzip on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/javascript application/json application/xml image/svg+xml;

    location ^~ /.well-known/acme-challenge/ {
        root /var/www/new.fbrk.kz;
        default_type "text/plain";
        try_files $uri =404;
    }

    location = /js/data.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /js/data-archive.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location = /js/article-full.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate" always;
        add_header Pragma "no-cache" always;
        add_header Expires "0" always;
        try_files $uri =404;
    }

    location ~* \.(?:css|js|svg|png|jpg|jpeg|webp|woff2)$ {
        add_header Cache-Control "public, max-age=86400" always;
        try_files $uri =404;
    }

    location /a/ {
        try_files $uri $uri/ /article.html;
    }

    error_page 404 /404.html;

    location / {
        try_files $uri $uri/ =404;
    }
}
