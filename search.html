<!doctype html>
<html lang="ru">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Поиск — ФБРК</title>
    <meta name="description" content="Поиск по материалам ФБРК: расследования, новости, темы и теги." />
    <meta name="theme-color" content="#0C115F" />
    <link rel="canonical" href="https://fbrk.qdev.run/search.html" />
    <meta property="og:site_name" content="ФБРК" />
    <meta property="og:locale" content="ru_RU" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Поиск — ФБРК" />
    <meta property="og:description" content="Поиск по материалам ФБРК." />
    <meta property="og:url" content="https://fbrk.qdev.run/search.html" />
    <meta property="og:image" content="https://fbrk.qdev.run/img/brand/logo-on-brand-640.png" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="icon" type="image/png" sizes="32x32" href="/img/brand/favicon-32.png" />
    <link rel="stylesheet" href="/fonts/avds/avds-fonts.css?v=202605161904" />
    <link rel="stylesheet" href="/css/style.css?v=202605161904" />
    <script>
      try {
        const t = localStorage.getItem('theme') || localStorage.getItem('fbrk_theme');
        document.documentElement.dataset.theme = t === 'dark' || t === 'light' ? t : (matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light');
      } catch (_) {}
    </script>
  </head>
  <body>
    <a class="skip-link" href="#main">Перейти к содержимому</a>
    <main id="main" class="content-page">
      <div class="container content-page__inner search-page" data-search-page>
        <header class="content-page__head">
          <div class="kicker content-page__eyebrow">Поиск</div>
          <h1 class="content-page__title">Поиск по материалам</h1>
        </header>
        <div class="search-page__form">
          <label>
            <span>Запрос</span>
            <input type="search" placeholder="Назарбаев, госзакупки, АФМ…" data-search-page-q autocomplete="off" autofocus />
          </label>
          <label>
            <span>Рубрика</span>
            <select data-search-page-cat>
              <option value="">Все</option>
              <option value="investigation">Расследования</option>
              <option value="news">Новости</option>
            </select>
          </label>
        </div>
        <p class="search-page__count" data-search-page-count></p>
        <div class="search-page__results" data-search-page-results></div>
        <div class="search-page__empty" data-search-page-empty hidden>
          <p>По запросу «<span data-empty-query></span>» ничего не найдено.</p>
          <button class="btn--secondary" type="button" data-search-page-reset>Сбросить</button>
        </div>
      </div>
    </main>
    <script src="/js/runtime-config.js?v=202605161904"></script>
    <script src="/js/data.js?v=202605161904"></script>
    <script src="/js/data-archive.js?v=202605161904"></script>
    <script src="/js/search-index.js?v=202605161904"></script>
    <script src="/js/app.js?v=202605161904"></script>
  </body>
</html>
